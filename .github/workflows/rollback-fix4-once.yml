name: Roll back Drawer Widget fix 4 once

on:
  push:
    branches:
      - feature/app-drawer-widget
    paths:
      - rollback-fix4.trigger

permissions:
  contents: write

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/app-drawer-widget

      - name: Restore package-only app entries
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path("drawer-widget/src/main/java/io/github/tomppi/drawerwidget/DrawerWidget.java")
          text = path.read_text()

          def replace_once(old, new, label):
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              text = text.replace(old, new, 1)

          replace_once(
              '''            return entry == null ? position : favoriteKey(entry).hashCode();''',
              '''            return entry == null ? position : entry.packageName.hashCode();''',
              "all-app stable ID")

          replace_once(
              '''                                || app.packageName.toLowerCase(Locale.ROOT).contains(query)
                                || app.component.getClassName()
                                        .toLowerCase(Locale.ROOT)
                                        .contains(query)) {''',
              '''                                || app.packageName.toLowerCase(Locale.ROOT).contains(query)) {''',
              "search filtering")

          replace_once(
              '''        private void saveCurrentOrder() {
            List<String> keys = new ArrayList<>();
            for (AppEntry entry : favorites) {
                keys.add(favoriteKey(entry));
            }
            saveFavoriteKeys(this, keys);
        }''',
              '''        private void saveCurrentOrder() {
            List<String> packages = new ArrayList<>();
            for (AppEntry entry : favorites) {
                packages.add(entry.packageName);
            }
            saveFavoritePackages(this, packages);
        }''',
              "favorites ordering")

          replace_once(
              '''            Set<String> existing = new LinkedHashSet<>(loadFavoriteKeys(this, allApps));
            for (AppEntry app : allApps) {
                labels.add(app.label + "\\n" + app.packageName + " · "
                        + app.component.getShortClassName());
            }''',
              '''            Set<String> existing = new LinkedHashSet<>(loadFavoritePackages(this));
            for (AppEntry app : allApps) {
                labels.add(app.label + "\\n" + app.packageName);
            }''',
              "favorite picker labels")

          replace_once(
              '''                listView.setItemChecked(i, existing.contains(favoriteKey(allApps.get(i))));''',
              '''                listView.setItemChecked(i, existing.contains(allApps.get(i).packageName));''',
              "favorite picker checked state")

          replace_once(
              '''                    chosen.add(favoriteKey(allApps.get(i)));''',
              '''                    chosen.add(allApps.get(i).packageName);''',
              "favorite picker selected key")

          replace_once(
              '''            for (String existing : loadFavoriteKeys(this, allApps)) {''',
              '''            for (String existing : loadFavoritePackages(this)) {''',
              "favorite picker ordering source")

          replace_once(
              '''            saveFavoriteKeys(this, ordered);''',
              '''            saveFavoritePackages(this, ordered);''',
              "favorite picker save")

          replace_once(
              '''            // Root-freeze remains package-based even when a package exposes several launcher
            // activities. Present one representative row per package here.
            allApps.addAll(loadPackageSelectionApps(this));''',
              '''            allApps.addAll(loadApps(this));''',
              "root-freeze app source")

          # Both adapters used component identities after fix 4.
          count = text.count('''            return favoriteKey(apps.get(position)).hashCode();''')
          if count != 2:
              raise SystemExit(f"adapter stable IDs: expected two matches, found {count}")
          text = text.replace(
              '''            return favoriteKey(apps.get(position)).hashCode();''',
              '''            return apps.get(position).packageName.hashCode();''')

          replace_once(
              '''            label.setText(displayedLabel(context, app) + "\\n" + app.packageName
                    + " · " + app.component.getShortClassName());''',
              '''            label.setText(displayedLabel(context, app) + "\\n" + app.packageName);''',
              "favorites manager row label")

          replace_once(
              '''                        + Uri.encode(favoriteKey(entry)))));''',
              '''                        + Uri.encode(entry.packageName)));''',
              "favorite pending-intent identity")

          start = text.index('''    /**
     * Returns component-based favorite identities''')
          end = text.index('''    private static Set<String> loadFreezePackages''', start)
          package_favorites = '''    /**
     * Returns package-only favorite identities. Values written by the component-based build are
     * migrated back to package names and deduplicated automatically.
     */
    private static List<String> loadFavoritePackages(Context context) {
        List<String> raw = readLines(prefs(context).getString(PREF_FAVORITES, ""));
        LinkedHashSet<String> normalized = new LinkedHashSet<>();
        boolean changed = false;

        for (String value : raw) {
            ComponentName component = ComponentName.unflattenFromString(value);
            String packageName = component == null ? value : component.getPackageName();
            if (!isValidPackageName(packageName)) {
                changed = true;
                continue;
            }
            if (!packageName.equals(value)) {
                changed = true;
            }
            if (!normalized.add(packageName)) {
                changed = true;
            }
        }

        if (changed) {
            prefs(context).edit()
                    .putString(PREF_FAVORITES, joinLines(normalized))
                    .apply();
        }
        return new ArrayList<>(normalized);
    }

    private static List<AppEntry> loadFavoriteEntries(Context context) {
        Map<String, AppEntry> apps = appMapByPackage(context);
        List<AppEntry> entries = new ArrayList<>();
        for (String packageName : loadFavoritePackages(context)) {
            AppEntry entry = apps.get(packageName);
            if (entry != null) {
                entries.add(entry);
            }
        }
        return entries;
    }

    private static void saveFavoritePackages(Context context, List<String> packages) {
        LinkedHashSet<String> unique = new LinkedHashSet<>();
        for (String packageName : packages) {
            if (isValidPackageName(packageName)) {
                unique.add(packageName);
            }
        }

        prefs(context).edit()
                .putString(PREF_FAVORITES, joinLines(unique))
                .apply();
        refreshFavoritesWidgets(context, true);
    }

'''
          text = text[:start] + package_favorites + text[end:]

          start = text.index('''    private static String favoriteKey(AppEntry entry)''')
          end = text.index('''    @SuppressWarnings("deprecation")''', start)
          package_map = '''    private static Map<String, AppEntry> appMapByPackage(Context context) {
        Map<String, AppEntry> result = new LinkedHashMap<>();
        for (AppEntry entry : loadApps(context)) {
            result.put(entry.packageName, entry);
        }
        return result;
    }

'''
          text = text[:start] + package_map + text[end:]

          start = text.index('''    @SuppressWarnings("deprecation")
    private static List<AppEntry> loadApps(Context context)''')
          end = text.index('''    private static List<ResolveInfo> queryLauncherActivities''', start)
          package_load_apps = '''    @SuppressWarnings("deprecation")
    private static List<AppEntry> loadApps(Context context) {
        PackageManager pm = context.getPackageManager();
        Intent launcherQuery = new Intent(Intent.ACTION_MAIN);
        launcherQuery.addCategory(Intent.CATEGORY_LAUNCHER);

        List<ResolveInfo> resolved = queryLauncherActivities(
                pm,
                launcherQuery,
                PackageManager.MATCH_DISABLED_COMPONENTS);
        Map<String, ResolveInfo> bestByPackage = new LinkedHashMap<>();

        for (ResolveInfo candidate : resolved) {
            ActivityInfo info = candidate.activityInfo;
            if (info == null
                    || info.name == null
                    || context.getPackageName().equals(info.packageName)
                    || !isValidPackageName(info.packageName)) {
                continue;
            }

            ResolveInfo current = bestByPackage.get(info.packageName);
            if (current == null
                    || candidateScore(pm, candidate) > candidateScore(pm, current)) {
                bestByPackage.put(info.packageName, candidate);
            }
        }

        List<AppEntry> apps = new ArrayList<>();
        for (ResolveInfo chosen : bestByPackage.values()) {
            ActivityInfo activityInfo = chosen.activityInfo;
            if (activityInfo == null || activityInfo.name == null) {
                continue;
            }

            String packageName = activityInfo.packageName;
            ComponentName component = new ComponentName(packageName, activityInfo.name);
            try {
                ApplicationInfo appInfo =
                        getApplicationInfoIncludingDisabled(pm, packageName);
                CharSequence loadedLabel = pm.getApplicationLabel(appInfo);
                String label = loadedLabel == null
                        ? packageName
                        : loadedLabel.toString();
                Drawable icon = pm.getApplicationIcon(appInfo);
                if (icon == null) {
                    icon = pm.getDefaultActivityIcon();
                }

                apps.add(new AppEntry(
                        packageName,
                        component,
                        label,
                        icon,
                        isActivityEnabled(pm, activityInfo)));
            } catch (PackageManager.NameNotFoundException | RuntimeException ignored) {
            }
        }

        Collator collator = Collator.getInstance(Locale.getDefault());
        apps.sort((left, right) -> {
            int labelResult = collator.compare(left.label, right.label);
            return labelResult != 0
                    ? labelResult
                    : left.packageName.compareTo(right.packageName);
        });
        return apps;
    }

'''
          text = text[:start] + package_load_apps + text[end:]

          # The component validator is no longer used after returning to package-only storage.
          text, count = re.subn(
              r'''\n    private static boolean isValidComponent\(ComponentName component\) \{.*?\n    \}\n''',
              "\n",
              text,
              count=1,
              flags=re.S)
          if count != 1:
              raise SystemExit(f"component validator removal: expected one match, found {count}")

          if "favoriteKey(" in text or "loadFavoriteKeys(" in text or "saveFavoriteKeys(" in text:
              raise SystemExit("component-based favorite helpers remain after rollback")
          if "bestByComponent" in text or "loadPackageSelectionApps" in text:
              raise SystemExit("component-based app enumeration remains after rollback")

          path.write_text(text)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add drawer-widget/src/main/java/io/github/tomppi/drawerwidget/DrawerWidget.java
          git commit -m "Roll back component-level app enumeration"
          git push origin HEAD:feature/app-drawer-widget
