name: Build App Drawer Widget

on:
  workflow_dispatch:
  push:
    branches: [ feature/app-drawer-widget ]
    paths:
      - 'drawer-widget/**'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'
      - '.github/workflows/build-drawer-widget.yml'
  pull_request:
    paths:
      - 'drawer-widget/**'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'
      - '.github/workflows/build-drawer-widget.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build drawer widget APK
        run: gradle --no-daemon :drawer-widget:assembleDebug

      - name: Upload drawer widget APK
        uses: actions/upload-artifact@v4
        with:
          name: q5q-app-drawer-widget
          path: drawer-widget/build/outputs/apk/debug/drawer-widget-debug.apk
          if-no-files-found: error
