name: Build App Drawer Widget

on:
  workflow_dispatch:
  push:
    branches: [ feature/app-drawer-widget ]
    paths:
      - 'split-widgets.trigger'
      - 'tools/split_widgets.py'
      - '.github/workflows/build-drawer-widget.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: feature/app-drawer-widget
          fetch-depth: 0

      - name: Split All Apps and Favorites widgets
        run: python3 tools/split_widgets.py

      - name: Commit widget split
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Split All Apps and Favorites widgets"
          git push origin HEAD:feature/app-drawer-widget

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build drawer widget APK
        run: gradle --no-daemon :drawer-widget:assembleDebug
